<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus OS Desktop</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- WALLPAPER CROSSFADE LAYERS -->
    <div id="bg-layer-1" class="wallpaper-layer"></div>
    <div id="bg-layer-2" class="wallpaper-layer" style="opacity: 0;"></div>

    <!-- DESKTOP AREA -->
    <main class="desktop">
        <!-- Apps grid (currently empty, can be used later) -->
        <div class="icon-grid">
            
        </div>
    </main>

    <!-- MAC-STYLE FLOATING DOCK (RIGHT SIDEBAR) -->
    <div class="mac-dock-container">
        <div class="mac-dock glass-panel" id="dynamic-dock">
            <div style="color: white; padding: 0 10px; font-size: 0.9rem;" id="dock-loading">
                <svg class="spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite; vertical-align: middle; margin-right: 8px;"><circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4" stroke-dashoffset="0"></circle></svg>
                Loading System Apps...
            </div>
            <!-- Dynamic Apps will be injected here -->
            <div class="dock-divider" id="dock-divider" style="display: none;"></div>
        </div>
    </div>

    <!-- NEW TRANSPARENT BOTTOM DOCK (TASKBAR STYLE) -->
    <div class="bottom-dock-container">
        <div class="bottom-dock" id="bottom-dock">
            <!-- Windows Start Button -->
            <div class="bottom-dock-item win-btn" title="Start">
                <svg viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg"><path d="M0 12.402l35.687-4.86.016 34.423-35.67.206L0 12.402zm39.79-5.467L87.973 0v41.528L39.79 41.73V6.935zm-39.756 39.54l35.655.19-.016 35.155-35.638-4.904V46.476zm39.756.242l48.183.25V88L39.79 81.332V46.718z" fill="#00a1f1"/></svg>
            </div>
            
            <!-- Search Bar -->
            <div class="search-bar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Search">
            </div>
            
            <div class="bottom-divider"></div>
            
            <!-- Dynamic Apps will be injected here (max 6) -->
            <div id="bottom-apps" style="display: flex; gap: 10px; align-items: center;"></div>
        </div>
    </div>

    <style>
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .dock-item img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            pointer-events: none;
        }
    </style>

    <script src="script.js"></script>
</body>
</html>
